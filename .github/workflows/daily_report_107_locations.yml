name: SupplyNote 107 Locations Report

on:
  workflow_dispatch:   # Triggered manually or by a separate webhook

jobs:
  download-and-email-107:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r github_action/requirements.txt

      - name: Install Playwright + Chromium (fallback browser)
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Write Google OAuth credentials from secrets
        run: |
          mkdir -p github_action/config
          echo "${{ secrets.GMAIL_TOKEN_JSON }}"       | base64 -d > github_action/config/token.json
          echo "${{ secrets.GMAIL_CREDENTIALS_JSON }}" | base64 -d > github_action/config/credentials.json

      - name: Run downloader (107 locations)
        env:
          SUPPLYNOTE_USER:        ${{ secrets.SUPPLYNOTE_USER }}
          SUPPLYNOTE_PASS:        ${{ secrets.SUPPLYNOTE_PASS }}
          SUPPLYNOTE_BUSINESS_ID: ${{ secrets.SUPPLYNOTE_BUSINESS_ID }}
          EMAIL_USER:             ${{ secrets.EMAIL_USER }}
          RECIPIENT_EMAIL:        ${{ secrets.RECIPIENTS_107_LOCATIONS }}
          GMAIL_CREDENTIALS_PATH: github_action/config/credentials.json
          GMAIL_TOKEN_PATH:       github_action/config/token.json
          DOWNLOAD_TYPE:          all
          REPORT_DATE:            today
          REPORT_TITLE:           SupplyNote Current Stock Report (107 Locations)
          REPORT_FILE_PREFIX:     107_Locations_Ingredient_Data
          FILTER_LOCATIONS_FILE:  107_locations.txt
          SKIP_DRIVE_UPLOAD:      true
        run: |
          cd github_action
          python downloader.py
